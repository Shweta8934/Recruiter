name: Deploy to aaPanel Server

on:
  push:
    branches:
      - main        # triggers on push to main branch
  workflow_dispatch: # allows manual trigger

jobs:
  deploy:
    name: Build & Deploy
    # Self-hosted runner runs directly on your VirtualBox VM
    # No SSH needed — the runner connects outward to GitHub
    runs-on: self-hosted

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4

      - name: Deploy Application
        run: |
          echo "📄 Copying .env, prisma folder, and Firebase key from server..."
          cp /www/wwwroot/ai-recruitment-platform/.env ./.env || echo "⚠️ Warning: .env file not found"
          cp -r /www/wwwroot/ai-recruitment-platform/prisma ./ || echo "⚠️ Warning: prisma folder not found"
          cp /www/wwwroot/ai-recruitment-platform/recruit-*.json ./ || echo "⚠️ Warning: Firebase JSON key not found"

          echo "🧹 Clearing old Next.js build cache..."
          sudo rm -rf .next node_modules/.cache

          echo "📥 Installing dependencies..."
          npm install

          echo "🗄️ Generating Prisma Client..."
          npx prisma generate

          echo "🏗️ Building the application..."
          npm run build

          echo "♻️ Restarting process on port 3000..."
          sudo fuser -k 3000/tcp || true

          echo "🚀 Starting server with npm run start in background..."
          nohup npm run start > server.log 2>&1 &

          echo "✅ Deployment complete!"

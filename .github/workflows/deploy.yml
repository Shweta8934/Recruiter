name: Deploy to aaPanel Server

on:
  push:
    branches:
      - main        # triggers on push to main branch
  workflow_dispatch: # allows manual trigger

jobs:
  deploy:
    name: Build & Deploy
    # Self-hosted runner runs directly on your VirtualBox VM
    # No SSH needed — the runner connects outward to GitHub
    runs-on: self-hosted

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4

      - name: Deploy Application
        run: |
          echo "🔄 Syncing new code to aaPanel directory..."
          rsync -av --exclude='.git' --exclude='node_modules' --exclude='.next' ./ /www/wwwroot/ai-recruitment-platform/
          
          echo "📂 Moving to aaPanel directory..."
          cd /www/wwwroot/ai-recruitment-platform/
          
          echo "🧹 Clearing old Next.js build cache..."
          rm -rf .next node_modules/.cache
          
          echo "📥 Installing dependencies..."
          npm install
          
          echo "🗄️ Generating Prisma Client..."
          npx prisma generate
          
          echo "🏗️ Building the application..."
          npm run build
          
          echo "♻️ Restarting process on port 3000..."
          fuser -k 3000/tcp || true
          
          echo "🚀 Starting server..."
          RUNNER_TRACKING_ID="" nohup npm run start > server.log 2>&1 &
          
          echo "✅ Deployment complete! Code updated in aaPanel."
